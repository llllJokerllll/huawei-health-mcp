version: '3.8'

services:
  huawei-health-api:
    build: ./api
    container_name: huawei-health-api
    ports:
      - "8081:8080"
    volumes:
      - ./api/data:/app/data
    environment:
      - APP_NAME=Huawei Health MCP API
      - APP_VERSION=1.0.0
      - HOST=0.0.0.0
      - PORT=8080
      - HUAWEI_CLIENT_ID=1917539503149440256
      - HUAWEI_CLIENT_SECRET=F8AAB9587C34F8D2D3D226642FE644CDDE66B10B7DC6CA0633C3877A463D8BD4
      - HUAWEI_REDIRECT_URI=https://huawei-api.sabatech.dev/api/v1/auth/callback
      - HUAWEI_API_BASE_URL=https://health-api.cloud.huawei.com/healthkit/v1/
      - HUAWEI_AUTH_URI=https://oauth-login.cloud.huawei.com/oauth2/v3/authorize
      - HUAWEI_TOKEN_URI=https://oauth-login.cloud.huawei.com/oauth2/v3/token
      - HUAWEI_SCOPE=https://www.huawei.com/healthkit
      - DATABASE_PATH=/app/data/health_data.db
      - SECRET_KEY=42241497ae6c63f3d13174fb5a58b6702590d13c682d716975c46b0730f42f6b
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/api/v1/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  huawei-health-data:
    driver: local
