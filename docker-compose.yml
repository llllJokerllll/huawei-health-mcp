version: '3.8'

services:
  huawei-health-api:
    build: ./api
    container_name: huawei-health-api
    ports:
      - "8000:8000"
    volumes:
      - ./api/data:/app/data
    environment:
      - APP_NAME=Huawei Health MCP API
      - APP_VERSION=1.0.0
      - HOST=0.0.0.0
      - PORT=8000
      - HUAWEI_CLIENT_ID=${HUAWEI_CLIENT_ID}
      - HUAWEI_CLIENT_SECRET=${HUAWEI_CLIENT_SECRET}
      - HUAWEI_REDIRECT_URI=${HUAWEI_REDIRECT_URI:-http://localhost:8000/api/v1/auth/callback}
      - HUAWEI_API_BASE_URL=https://health-api.cloud.huawei.com/healthkit/v1/
      - HUAWEI_AUTH_URI=https://oauth-login.cloud.huawei.com/oauth2/v3/authorize
      - HUAWEI_TOKEN_URI=https://oauth-login.cloud.huawei.com/oauth2/v3/token
      - HUAWEI_SCOPES=https://www.huawei.com/healthkit
      - DATABASE_PATH=/app/data/health_data.db
      - SECRET_KEY=${SECRET_KEY:-default-secret-key-change-in-production}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  huawei-health-data:
    driver: local
